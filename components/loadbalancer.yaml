AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::LanguageExtensions
Description: |
  AWS sample template. Create Load Balancer, Target Group, Listener and WAF.

Parameters:
  ResourceName:
    Description: Name of the resources
    Type: String
    Default: 'MonseG'
  VPCId:
    Description: The ID of the VPC where resources will be created
    Type: String
  SubnetIds:
    Description: Subnet IDs to be used by the load balancer
    Type: List<String>
  InstanceId1:
    Description: ID of the first EC2 instance to be registered with the target group
    Type: String
    Default: ''
  AllowedIPs:
    Description: List of allowed IP addresses in CIDR format (e.g., 192.168.1.0/24)
    Type: CommaDelimitedList
    Default: '192.168.1.0/24'

Resources:
########################### Security Group
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties: 
      GroupDescription: 'ALB Allowed Ports.'
      GroupName: !Sub '${ResourceName}-${AWS::StackName}-lb-sg'
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          CidrIp: '0.0.0.0/0'
          FromPort: 80
          ToPort: 80
      Tags: 
        - Key: Name
          Value: !Sub '${ResourceName}-${AWS::StackName}-lb-sg'

########################### Load Balancer Configuration
  ApplicationLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties: 
      Name: !Sub '${ResourceName}-${AWS::StackName}-alb'
      Type: 'application'
      Scheme: 'internet-facing'
      IpAddressType: 'ipv4'
      SecurityGroups: 
        - !GetAtt SecurityGroup.GroupId
      Subnets: 
        - !Ref SubnetIds
      Tags: 
        - Key: 'Name'
          Value: !Sub '${ResourceName}-${AWS::StackName}-alb'

########################### Target Group Configuration
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ResourceName}-${AWS::StackName}-alb-tg'
      TargetType: 'instance'
      Protocol: 'HTTP'
      Port: 80
      VpcId: !Ref VPCId
      Targets: 
        - Id: !Ref InstanceId1
          Port: 80
        # - Id: !Ref InstanceTwo
        #   Port: 80
      HealthCheckIntervalSeconds: 30
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 15
      HealthyThresholdCount: 5
      Matcher:
        HttpCode: '200'
      UnhealthyThresholdCount: 3
      Tags: 
        - Key: 'Name'
          Value: !Sub '${ResourceName}-${AWS::StackName}-alb-tg'

############################ Listener Configuration
  LBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions: 
        - Type: 'forward'
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref ApplicationLB
      Protocol: 'HTTP'
      Port: 80

########################### Restrict IP Addresses
  IPSetAllowed:
    Type: AWS::WAFv2::IPSet
    Properties: 
      Name: !Sub '${ResourceName}-${AWS::StackName}-ipset'
      Description: 'IP set for allowing specific IP addresses'
      Scope: 'REGIONAL'
      IPAddressVersion: 'IPV4'
      Addresses: 
        - !Ref AllowedIPs

########################### WAF
  WAFLoadBalancer:
    Type: AWS::WAFv2::WebACL
    Properties: 
      Name: !Sub '${ResourceName}-${AWS::StackName}-waf'
      Scope: 'REGIONAL'
      DefaultAction: 
        Allow: {}
      VisibilityConfig: 
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ResourceName}-${AWS::StackName}-waf-metric'
      Rules: 
        # Rule 1: Allow specific IP addresses
        - Name: 'AllowSpecificIPs'
          Priority: 0
          Action:
            Allow: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: 'AllowSpecificIPs'
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt IPSetAllowed.Arn
        
        # Rule 2: Block XSS attacks
        - Name: 'BlockXSSAttacks'
          Priority: 1
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: 'BlockXSSAttacks'
          Statement:
            XssMatchStatement:
              FieldToMatch:
                Body: {}
              TextTransformations:
                - Type: 'HTML_ENTITY_DECODE'
                  Priority: 0
                - Type: 'LOWERCASE'
                  Priority: 1
        
        # Rule 3: Rate limiting
        - Name: 'RateLimitRule'
          Priority: 2
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: 'RateLimitRule'
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: 'IP'
        
        # Rule 4: Geographic restriction
        - Name: 'GeoBlockRule'
          Priority: 3
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: 'GeoBlockRule'
          Statement:
            GeoMatchStatement:
              CountryCodes:
                - 'CN'
                - 'RU'
        
        # Rule 5: SQL Injection protection
        - Name: 'SQLInjectionRule'
          Priority: 4
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: 'SQLInjectionRule'
          Statement:
            SqliMatchStatement:
              FieldToMatch:
                Body: {}
              TextTransformations:
                - Type: 'URL_DECODE'
                  Priority: 0
                - Type: 'HTML_ENTITY_DECODE'
                  Priority: 1

  ACLAssociation:
    Type: "AWS::WAFv2::WebACLAssociation"
    Properties:
      ResourceArn: !Ref ApplicationLB
      WebACLArn: !GetAtt WAFLoadBalancer.Arn
