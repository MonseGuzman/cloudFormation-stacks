AWSTemplateFormatVersion: '2010-09-09'
Description: |
  AWS sample template. Create a Instance, Security Group rules and a SSH Key. 

Parameters:
  ResourceName:
    Description: Name of the resources
    Type: String
    Default: 'MonseG'
  VPCId:
    Description: VPC Id from network stack
    Type: String
  SubnetId:
    Description: Subnet Id from network stack
    Type: String
  SecurityGroupId:
    Description: Security Group Id from network stack
    Type: String
  InstanceType:
    Description: Select type of the instance
    Type: String
  InstanceOS:
    Description: OS to the instance
    Type: String
    AllowedValues: ["Linux", "Ubuntu"]
    Default: "Ubuntu"
    ConstraintDescription: Must be Linux or Ubuntu

Mappings:
  AWSRegionAMI:
    ca-central-1:
      Linux: ami-042f39687f93b4afb
      Ubuntu: ami-00b6fcfc5204b62ed
    us-west-2: 
      Linux: ami-0ccea833bf267252a
      Ubuntu: ami-038937b3d6616035f
    us-east-2: 
      Linux: ami-01103fb68b3569475
      Ubuntu: ami-0430580de6244e02e
    us-east-1:
      Linux: ami-03a6eaae9938c858c
      Ubuntu: ami-053b0d53c279acc90

Rules:
  InstanceTypeAllow:
    RuleCondition: !Fn::Equals [!Ref 'AWS::Region', 'us-east-1']
    Assertions:
      - Assert:
          'Fn::Contains':
            - ["t2.nano", "t2.micro", "t2.small"]
            - !Ref InstanceType
        AssertDescription: 'For this region, the instance type must choose between "t2.micro", "t2.nano" or "t2.small" at least'

Resources:
########################### Security Group Rules
  IngressRule1:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow connections from specified CIDR ranges
      GroupId: !Ref VPCId
      CidrIp: 0.0.0.0/0
      FromPort: 80
      ToPort: 80
      IpProtocol: tcp

  IngressRule2:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref VPCId
      CidrIp: 0.0.0.0/0 # myip
      FromPort: 22
      ToPort: 22
      IpProtocol: tcp

############################# Key Pair Configuration
  SSHKey:
    Type: AWS::EC2::KeyPair
    Properties: 
      KeyFormat: pem
      KeyName: !Sub '${ResourceName}-key'
      KeyType: rsa
      Tags: 
        - Key: Name
          Value: !Sub '${ResourceName}-${AWS::StackName}-key'

############################# EC2 Instance Configuration
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionAMI, !Ref 'AWS::Region', !Ref InstanceOS]
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      KeyName: !Sub '${ResourceName}-key'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1> Hello World from $(hostname -f)<a/h1>" > /var/www/html/index.html
      SecurityGroupIds:
        - !Ref SecurityGroupId
      Tags: 
        - Key: Name
          Value: !Sub '${ResourceName}-${AWS::StackName}-ec2'

  # MyEIP:
  #   Type: AWS::EC2::EIP
  #   Properties:
  #     InstanceId: !Ref MyInstance

Outputs:
  KeySSMParameter:
    Description: Name of the SSM parameter that contains the private key
    Value: !Join 
      - ''
      - - '/ec2/keypair/'
        - !GetAtt SSHKey.KeyPairId
  # PublicIP:
  #   Description: Id of the instance
  #   Value: !GetAtt MyInstance.PublicIp
  #   Export:
  #     Name: PublicIP # In case that you want to export to another stack
